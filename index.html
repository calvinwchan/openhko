<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f1ede3" />
    <meta
      name="description"
      content="A clean Hong Kong weather app powered by official Hong Kong Observatory open data."
    />
    <title>OpenHKO · Hong Kong Weather</title>
    <script>
      // Apply the saved/preferred theme before first paint to avoid a flash.
      // Reads the openhko.theme cookie; anything but light/dark means "system".
      (function () {
        try {
          var m = document.cookie.match(/(?:^|; )openhko\.theme=([^;]*)/);
          var t = m ? decodeURIComponent(m[1]) : null;
          if (t !== "light" && t !== "dark") {
            t = matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          }
          document.documentElement.dataset.theme = t;
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,900&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+SC:wght@400;500;600;700&family=IBM+Plex+Sans+TC:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
